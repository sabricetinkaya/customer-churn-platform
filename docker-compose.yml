services:
  postgres:
    image: postgres:16
    container_name: churn-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: churn-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD-SHELL", "cub zk-ready zookeeper:2181 60" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: churn-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  init-kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: churn-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic customer.events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic prediction.events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic risk.events --partitions 1 --replication-factor 1
        echo "Kafka topics created successfully."
    restart: "no"

  init-db:
    build: .
    container_name: churn-init-db
    command: >
      sh -c "sleep 8 && python -m src.database.init_db"
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      - postgres

  customer-api:
    build: .
    container_name: churn-customer-api
    ports:
      - "8000:8000"
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID}
      PREDICTION_CONSUMER_GROUP: ${PREDICTION_CONSUMER_GROUP}
      PERSISTENCE_CONSUMER_GROUP: ${PERSISTENCE_CONSUMER_GROUP}
      CUSTOMER_TOPIC: ${CUSTOMER_TOPIC}
      PREDICTION_TOPIC: ${PREDICTION_TOPIC}
      RISK_TOPIC: ${RISK_TOPIC}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      kafka:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      init-db:
        condition: service_completed_successfully

  prediction-service:
    build: .
    container_name: churn-prediction-service
    command: python -m src.services.prediction_service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID}
      PREDICTION_CONSUMER_GROUP: ${PREDICTION_CONSUMER_GROUP}
      PERSISTENCE_CONSUMER_GROUP: ${PERSISTENCE_CONSUMER_GROUP}
      CUSTOMER_TOPIC: ${CUSTOMER_TOPIC}
      PREDICTION_TOPIC: ${PREDICTION_TOPIC}
      RISK_TOPIC: ${RISK_TOPIC}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      kafka:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      init-db:
        condition: service_completed_successfully

  persistence-service:
    build: .
    container_name: churn-persistence-service
    command: python -m src.services.persistence_service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID}
      PERSISTENCE_CONSUMER_GROUP: ${PERSISTENCE_CONSUMER_GROUP}
      PREDICTION_CONSUMER_GROUP: ${PREDICTION_CONSUMER_GROUP}
      CUSTOMER_TOPIC: ${CUSTOMER_TOPIC}
      PREDICTION_TOPIC: ${PREDICTION_TOPIC}
      RISK_TOPIC: ${RISK_TOPIC}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    depends_on:
      kafka:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      init-db:
        condition: service_completed_successfully

volumes:
  postgres_data: