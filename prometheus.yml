global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["customer-api:8000"]

  - job_name: "prediction-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["prediction-service:8000"]

  - job_name: "persistence-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["persistence-service:8000"]